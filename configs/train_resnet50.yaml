# configs/train_resnet50.yaml — ResNet-50 con fine-tuning

experiment_name: "resnet50_finetune_focal"
seed: 42
device: "cuda"
use_wandb: false
output_dir: "outputs"

data:
  root: "data/processed"
  img_size: 224
  augmentation: "aggressive"

model:
  name: "resnet50"
  num_classes: 2
  pretrained: true
  freeze_backbone: false    # entrenar todo el backbone
  dropout_rate: 0.4

training:
  epochs: 40
  batch_size: 32
  num_workers: 2
  lr: 1.0e-4                 # LR más baja para fine-tuning
  lr_min: 1.0e-7
  weight_decay: 5.0e-5
  loss: "focal"
  focal_alpha: 0.75
  focal_gamma: 2.0
  use_class_weights: false
  use_weighted_sampler: true

early_stopping_patience: 12
