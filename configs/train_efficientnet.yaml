# configs/train_efficientnet.yaml — EfficientNet-B3 con fine-tuning

experiment_name: "efficientnet_b3_finetune_focal"
seed: 42
device: "cuda"
use_wandb: false
output_dir: "outputs"

data:
  root: "data/processed"
  img_size: 300            # resolución nativa de EfficientNet-B3
  augmentation: "aggressive"

model:
  name: "efficientnet_b3"
  num_classes: 2
  pretrained: true
  freeze_backbone: false
  dropout_rate: 0.35

training:
  epochs: 40
  batch_size: 24           # batch más pequeño por resolución mayor
  num_workers: 2
  lr: 8.0e-5
  lr_min: 1.0e-7
  weight_decay: 5.0e-5
  loss: "focal"
  focal_alpha: 0.75
  focal_gamma: 2.0
  use_class_weights: false
  use_weighted_sampler: true

early_stopping_patience: 12
