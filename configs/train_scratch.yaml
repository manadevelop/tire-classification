# configs/train_scratch.yaml — CNN desde cero (CustomCNN)

experiment_name: "custom_cnn_aggressive_focal"
seed: 42
device: "cuda"        # se sobreescribe automáticamente si no hay GPU
use_wandb: false
output_dir: "outputs"

data:
  root: "data/processed"
  img_size: 224
  augmentation: "aggressive"   # minimal | standard | aggressive

model:
  name: "custom_cnn"
  num_classes: 2
  dropout_rate: 0.5
  base_channels: 32

training:
  epochs: 60
  batch_size: 32
  num_workers: 4
  lr: 3.0e-4
  lr_min: 1.0e-6
  weight_decay: 1.0e-4
  loss: "focal"                # bce | focal | cross_entropy
  focal_alpha: 0.75            # mayor peso a clase positiva (cracked)
  focal_gamma: 2.0
  use_class_weights: false     # usar pesos de clase en la pérdida
  use_weighted_sampler: true   # usar WeightedRandomSampler

early_stopping_patience: 15
